<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Diagnosis Predictor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container glass-panel">
        <header>
            <h1>Cancer Diagnosis <span class="gradient-text">Predictor</span></h1>
            <p>Analyze genetic mutations and clinical text using our advanced ML pipeline.</p>
        </header>

        <form id="prediction-form">
            <div class="input-group">
                <label for="gene">Gene</label>
                <input type="text" id="gene" name="gene" placeholder="e.g. BRCA1" required />
            </div>

            <div class="input-group">
                <label for="variation">Variation</label>
                <input type="text" id="variation" name="variation" placeholder="e.g. S1613" required />
            </div>

            <div class="input-group">
                <label for="text">Clinical Text</label>
                <textarea id="text" name="text" rows="5" placeholder="Enter clinical literature or patient text here..." required></textarea>
            </div>

            <button type="submit" class="glow-button">
                <span class="button-text">Analyze Mutation</span>
                <span class="loader" style="display: none;"></span>
            </button>
        </form>

        <div id="result-container" class="result-box hidden">
            <h3>Prediction Result</h3>
            <p>Class: <span id="predicted-class" class="result-class">...</span></p>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
